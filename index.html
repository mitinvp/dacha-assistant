<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Щоденник дачника</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EEE8D6;
    --paper-2: #E4DCC4;
    --ink: #232B1E;
    --leaf: #3B5D33;
    --leaf-light: #6B8F5E;
    --marigold: #C98A2A;
    --rust: #A8432E;
    --soil: #7A5B3A;
    --sky: #4A6B7A;
    --prune: #7A5C8C;
    --frost: #5C7A93;
    --line: #C7BC9C;
    --line-strong: #A79A72;
  }
  *{box-sizing:border-box;}
  button, input, select{ font: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible, .crop-btn:focus-visible, .tab-btn:focus-visible{
    outline: 2.5px solid var(--rust); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
  .crop-btn, .tab-btn, .candidate-item, .dashboard-btn, .ics-btn{ transition: background-color .15s ease, border-color .15s ease, color .15s ease; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    background-image: radial-gradient(circle at 1px 1px, rgba(35,43,30,0.06) 1px, transparent 0);
    background-size: 14px 14px;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns: 250px 1fr;
    min-height:100vh;
  }
  .app.wide{ grid-template-columns: 1fr; }
  @media (max-width: 780px){ .app{grid-template-columns: 1fr;} }

  .header{
    grid-column: 1 / -1;
    padding: 24px 28px 0;
    border-bottom: 2px solid var(--line-strong);
  }
  .header-top{
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px;
    padding-bottom:16px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand h1{ font-family:'Fraunces', serif; font-style: italic; font-weight:600; font-size: 30px; margin:0; letter-spacing:-0.5px; color: var(--leaf); }
  .brand p{ margin:2px 0 0; font-size:13px; color: var(--soil); }
  .month-picker{ display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono', monospace; font-size:13px; }
  .month-picker select{ font-family:'JetBrains Mono', monospace; font-size:13px; padding:7px 10px; background: var(--paper-2); border:1px solid var(--line-strong); border-radius:3px; color:var(--ink); }
  .theme-toggle{ padding:7px 12px; background:var(--paper-2); border:1px solid var(--line-strong); border-radius:3px; font-family:'Inter', sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--ink); white-space:nowrap; }
  .auth-info{ font-family:'Inter', sans-serif; font-size:12.5px; color:var(--soil); font-weight:600; }
  .sync-note{ padding: 0 28px 12px; font-size:12px; color:var(--soil); font-style:italic; }
  .sync-note.synced{ color:var(--leaf); font-style:normal; }
  .global-search{ position:relative; padding: 0 28px 14px; }
  .global-search input{ width:100%; padding:10px 14px; border:1px solid var(--line-strong); border-radius:6px; background:var(--paper-2); color:var(--ink); font-size:14px; font-family:'Inter', sans-serif; }
  .global-search-results{ position:absolute; left:28px; right:28px; top:calc(100% - 8px); background:var(--paper); border:1px solid var(--line-strong); border-radius:6px; box-shadow:0 6px 18px rgba(0,0,0,0.15); z-index:20; max-height:340px; overflow-y:auto; display:none; }
  .global-search-results.open{ display:block; }
  .gsr-item{ display:flex; align-items:center; gap:10px; width:100%; padding:9px 14px; background:transparent; border:none; border-bottom:1px solid var(--line); cursor:pointer; text-align:left; font-family:'Inter', sans-serif; font-size:14px; color:var(--ink); }
  .gsr-item:last-child{ border-bottom:none; }
  .gsr-item:hover, .gsr-item:focus-visible{ background:var(--paper-2); }
  .gsr-item .seal{ width:26px; height:26px; }
  .gsr-item .seal svg{ width:15px; height:15px; }
  .gsr-item .gsr-cat{ margin-left:auto; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--soil); text-transform:uppercase; }
  .gsr-empty{ padding:12px 14px; font-size:13px; color:var(--soil); font-style:italic; }

  .tabs{ display:flex; gap:4px; flex-wrap:wrap; }
  .tab-btn{
    padding:9px 14px; background:transparent; border:none; border-bottom:3px solid transparent;
    font-family:'Inter', sans-serif; font-weight:600; font-size:13.5px; color:var(--soil); cursor:pointer;
  }
  .tab-btn.active{ color:var(--leaf); border-bottom-color:var(--leaf); }

  .sidebar{ padding: 22px 18px; border-right: 2px solid var(--line-strong); }
  .sidebar-toggle{ display:none; width:100%; justify-content:space-between; align-items:center; padding:9px 12px; margin-bottom:12px; background:var(--paper-2); border:1px solid var(--line-strong); border-radius:4px; font-family:'Inter', sans-serif; font-weight:600; font-size:13.5px; color:var(--ink); cursor:pointer; }
  @media (max-width: 780px){
    .sidebar-toggle{ display:flex; }
    .sidebar.collapsed #cropList, .sidebar.collapsed #treeList, .sidebar.collapsed .sidebar-label, .sidebar.collapsed .sidebar-search{ display:none !important; }
  }
  .sidebar-search{ width:100%; padding:8px 10px; margin-bottom:10px; border:1px solid var(--line-strong); border-radius:4px; background:var(--paper); font-size:13px; font-family:'Inter', sans-serif; color:var(--ink); }
  .sidebar-label{ font-family:'JetBrains Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--soil); margin: 4px 4px 12px; }
  .crop-btn{ display:flex; align-items:center; gap:12px; width:100%; padding:9px 10px; margin-bottom:5px; background:transparent; border: 1px solid transparent; border-radius:4px; cursor:pointer; text-align:left; font-family:'Inter', sans-serif; font-size:14.5px; color: var(--ink); }
  .crop-btn:hover{ background: var(--paper-2); }
  .crop-btn.active{ background: var(--paper-2); border-color: var(--line-strong); }
  .seal{ flex-shrink:0; width:32px; height:32px; border-radius:50%; border: 1.5px dashed var(--soil); display:flex; align-items:center; justify-content:center; transform: rotate(-4deg); }
  .seal svg{ width:19px; height:19px; }
  .dashboard-btn{ display:flex; align-items:center; gap:12px; width:100%; padding:9px 10px; margin-bottom:16px; background: var(--leaf); border:none; border-radius:4px; cursor:pointer; color:var(--paper); font-family:'Inter', sans-serif; font-weight:600; font-size:14px; }
  .dashboard-btn.inactive{ background:transparent; color:var(--leaf); border:1.5px solid var(--leaf); }

  .main{ padding: 26px 32px 60px; }
  .dash-title{ font-family:'Fraunces', serif; font-style:italic; font-size:26px; margin: 0 0 4px; }
  .dash-sub{ font-size:13px; color:var(--soil); margin:0 0 22px; }

  .task-group{ margin-bottom: 22px; border-left: 4px solid var(--line-strong); padding-left: 16px; }
  .task-group.plant{ border-color: var(--leaf); }
  .task-group.fertilize{ border-color: var(--marigold); }
  .task-group.spray{ border-color: var(--rust); }
  .task-group.harvest{ border-color: var(--soil); }
  .task-group.prune{ border-color: var(--prune); }
  .task-group.protect{ border-color: var(--frost); }
  .task-group h3{ font-family:'JetBrains Mono', monospace; text-transform:uppercase; letter-spacing:1px; font-size:12.5px; margin:0 0 8px; }
  .task-group.plant h3{ color:var(--leaf); }
  .task-group.fertilize h3{ color:var(--marigold); }
  .task-group.spray h3{ color:var(--rust); }
  .task-group.harvest h3{ color:var(--soil); }
  .task-group.prune h3{ color:var(--prune); }
  .task-group.protect h3{ color:var(--frost); }
  .task-row{ font-size:14.5px; line-height:1.5; margin-bottom:6px; display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .empty-note{ font-size:14px; color: var(--soil); font-style:italic; font-family:'Fraunces', serif; }

  .ics-btn{
    font-family:'JetBrains Mono', monospace; font-size:11px; padding:4px 9px; background:var(--paper); border:1px solid var(--line-strong);
    border-radius:3px; cursor:pointer; color:var(--soil); white-space:nowrap;
  }
  .ics-btn:hover{ background:var(--paper-2); }

  .crop-head{ display:flex; align-items:center; gap:18px; margin-bottom: 18px; }
  .seal-lg{ width:64px; height:64px; border-radius:50%; border: 2px dashed var(--soil); display:flex; align-items:center; justify-content:center; transform: rotate(-4deg); flex-shrink:0; }
  .seal-lg svg{ width:36px; height:36px; }
  .crop-head h2{ font-family:'Fraunces', serif; font-style:italic; font-size:30px; margin:0; color:var(--leaf); }
  .crop-family{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--soil); }

  .timeline{ display:grid; grid-template-columns: repeat(12, 1fr); border:1.5px solid var(--line-strong); border-radius:4px; overflow:hidden; margin-bottom: 22px; }
  .tl-cell{ border-right:1px solid var(--line); padding: 8px 4px 10px; text-align:center; background: var(--paper); }
  .tl-cell:last-child{ border-right:none; }
  .tl-cell .tl-label{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--soil); display:block; margin-bottom:6px; }
  .tl-dots{ display:flex; justify-content:center; gap:3px; flex-wrap:wrap; }
  .dot{ width:7px; height:7px; border-radius:50%; }
  .dot.plant{ background:var(--leaf); }
  .dot.fertilize{ background:var(--marigold); }
  .dot.spray{ background:var(--rust); }
  .dot.harvest{ background:var(--soil); }
  .dot.prune{ background:var(--prune); }
  .dot.protect{ background:var(--frost); }

  .sections{ display:grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 640px){ .sections{ grid-template-columns: 1fr; } }
  .section-card{ background: var(--paper-2); border:1px solid var(--line-strong); border-radius:6px; padding:16px 18px; }
  .section-card h4{ font-family:'JetBrains Mono', monospace; text-transform:uppercase; font-size:12px; letter-spacing:1px; margin:0 0 10px; }
  .section-card.plant h4{ color:var(--leaf); }
  .section-card.fertilize h4{ color:var(--marigold); }
  .section-card.spray h4{ color:var(--rust); }
  .section-card.harvest h4{ color:var(--soil); }
  .section-card.prune h4{ color:var(--prune); }
  .section-card.protect h4{ color:var(--frost); }
  .section-card.rotation h4{ color:var(--sky); }
  .section-card.companions h4{ color:var(--leaf); }
  .section-card.watering h4{ color:var(--sky); }
  .section-card.care h4{ color:var(--sky); }
  .section-card.notes-box h4{ color:var(--prune); }
  .notes-box textarea{ width:100%; min-height:70px; padding:8px 10px; border:1px solid var(--line-strong); border-radius:5px; background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; font-size:13.5px; resize:vertical; }
  .notes-status{ font-size:11.5px; color:var(--leaf); height:14px; margin-top:4px; }
  .notes-print-text{ display:none; font-size:13.5px; white-space:pre-wrap; }
  .section-card ul{ margin:0; padding-left:18px; }
  .section-card li{ font-size:13.5px; line-height:1.55; margin-bottom:8px; }
  .section-card p{ font-size:13.5px; line-height:1.55; margin:0 0 8px; }
  .months-tag{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--soil); }
  .tag-pill{ display:inline-block; font-size:12px; background:var(--paper); border:1px solid var(--line-strong); border-radius:12px; padding:2px 9px; margin:2px 4px 2px 0; }
  .tag-pill-muted{ font-style:italic; color:var(--soil); border-style:dashed; }

  .legend{ display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--soil); margin-bottom:18px; }

  .bed-card{ background:var(--paper-2); border:1px solid var(--line-strong); border-radius:6px; padding:16px 18px; margin-bottom:16px; }
  .bed-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .bed-head input{ font-family:'Fraunces', serif; font-style:italic; font-size:18px; border:none; background:transparent; color:var(--leaf); border-bottom:1px dashed var(--line-strong); padding:2px 0; }
  .bed-years{ display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
  .bed-years label{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--soil); display:block; margin-bottom:4px; }
  .bed-years select{ width:100%; padding:6px; border:1px solid var(--line-strong); border-radius:3px; background:var(--paper); font-size:13px; }
  .bed-warning{ margin-top:10px; padding:8px 10px; border-radius:4px; font-size:13px; }
  .bed-warning.bad{ background:#F0DBD3; color:var(--rust); border:1px solid var(--rust); }
  .bed-warning.ok{ background:#DDE7D5; color:var(--leaf); border:1px solid var(--leaf); }
  .remove-bed{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--rust); background:none; border:none; cursor:pointer; }
  .add-bed-btn{ padding:8px 14px; background:var(--leaf); color:var(--paper); border:none; border-radius:4px; font-family:'Inter'; font-weight:600; cursor:pointer; font-size:13.5px; }
  .rotation-rules{ margin-top:24px; }
  .rotation-rules table{ width:100%; border-collapse:collapse; font-size:13px; }
  .rotation-rules th, .rotation-rules td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
  .rotation-rules th{ font-family:'JetBrains Mono', monospace; text-transform:uppercase; font-size:11px; color:var(--soil); }

  .weather-search{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .weather-search input{ flex:1; min-width:160px; padding:9px 12px; border:1px solid var(--line-strong); border-radius:4px; font-size:14px; background:var(--paper-2); }
  .weather-search button{ padding:9px 16px; background:var(--sky); color:white; border:none; border-radius:4px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .geo-btn{ background:var(--leaf) !important; }
  .candidate-list{ background:var(--paper-2); border:1px solid var(--line-strong); border-radius:6px; padding:6px; margin-bottom:20px; }
  .candidate-item{ display:block; width:100%; text-align:left; padding:10px 12px; background:transparent; border:none; border-bottom:1px solid var(--line); cursor:pointer; font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); }
  .candidate-item:last-child{ border-bottom:none; }
  .candidate-item:hover{ background:var(--paper); }
  .candidate-item b{ display:block; font-size:14.5px; }
  .candidate-item span{ font-size:12px; color:var(--soil); font-family:'JetBrains Mono', monospace; }
  .candidate-hint{ font-size:12.5px; color:var(--soil); margin:0 0 20px; font-style:italic; }
  .weather-card{ background:var(--paper-2); border:1px solid var(--line-strong); border-radius:6px; padding:22px; }
  .weather-now{ display:flex; align-items:baseline; gap:14px; margin-bottom:16px; }
  .weather-now .temp{ font-family:'Fraunces', serif; font-style:italic; font-size:48px; color:var(--sky); }
  .weather-now .desc{ font-size:14px; color:var(--soil); }
  .weather-days{ display:grid; grid-template-columns: repeat(auto-fit, minmax(90px,1fr)); gap:10px; margin-top:14px; }
  .wday{ text-align:center; background:var(--paper); border:1px solid var(--line); border-radius:4px; padding:10px 6px; }
  .wday .wd-label{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--soil); }
  .wday .wd-temp{ font-size:15px; margin:6px 0 2px; font-weight:600;}
  .wday .wd-rain{ font-size:11px; color:var(--sky); }
  .spray-advisory{ margin-top:18px; padding:12px 14px; border-radius:5px; font-size:13.5px; }
  .spray-advisory.warn{ background:#F0DBD3; border:1px solid var(--rust); color:var(--rust); }
  .spray-advisory.good{ background:#DDE7D5; border:1px solid var(--leaf); color:var(--leaf); }

  .moon-card{ display:flex; gap:26px; align-items:center; background:var(--paper-2); border:1px solid var(--line-strong); border-radius:6px; padding:24px; flex-wrap:wrap; }
  .moon-visual{ width:90px; height:90px; border-radius:50%; background:#2b2b2b; position:relative; overflow:hidden; flex-shrink:0; border:1px solid var(--line-strong); }
  .moon-visual .lit{ position:absolute; top:0; height:100%; background:#EFE6C8; }
  .moon-info h3{ font-family:'Fraunces', serif; font-style:italic; margin:0 0 6px; font-size:22px; color:var(--leaf); }
  .moon-info p{ font-size:13.5px; line-height:1.6; margin:0 0 6px; max-width:560px; }
  .moon-disclaimer{ font-size:11.5px; color:var(--soil); font-style:italic; margin-top:10px; }
  .moon-table{ margin-top:22px; width:100%; border-collapse:collapse; font-size:13px; }
  .moon-table th, .moon-table td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
  .moon-table th{ font-family:'JetBrains Mono', monospace; text-transform:uppercase; font-size:11px; color:var(--soil); }

  .problem-search{ margin-bottom:18px; }
  .cat-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .cat-chip{ padding:6px 14px; border-radius:14px; border:1px solid var(--line-strong); background:var(--paper-2); color:var(--ink); font-family:'Inter', sans-serif; font-size:13px; cursor:pointer; }
  .cat-chip.active{ background:var(--leaf); border-color:var(--leaf); color:var(--paper); font-weight:600; }
  .problem-search input{ width:100%; padding:10px 14px; border:1px solid var(--line-strong); border-radius:4px; font-size:14px; background:var(--paper-2); }
  .problem-card{ background:var(--paper-2); border-left:4px solid var(--rust); border-radius:0 6px 6px 0; padding:14px 18px; margin-bottom:12px; }
  .products-group-title{ font-family:'JetBrains Mono', monospace; text-transform:uppercase; letter-spacing:1px; font-size:13px; color:var(--sky); margin:22px 0 10px; }
  .products-group-title:first-of-type{ margin-top:4px; }
  .problem-card h4{ margin:0 0 6px; font-size:15px; font-family:'Fraunces', serif; font-style:italic; color:var(--rust); }
  .problem-card p{ margin:3px 0; font-size:13.5px; line-height:1.5; }
  .problem-card .lbl{ font-family:'JetBrains Mono', monospace; font-size:10.5px; text-transform:uppercase; color:var(--soil); }

  .reminder-note{ font-size:12.5px; color:var(--soil); background:var(--paper-2); border:1px dashed var(--line-strong); border-radius:5px; padding:10px 14px; margin-bottom:20px; line-height:1.5; }

  [data-theme="dark"]{
    --paper: #1E231C;
    --paper-2: #262C22;
    --ink: #EAE6D8;
    --leaf: #8FBF7A;
    --leaf-light: #6B8F5E;
    --marigold: #E3B23C;
    --rust: #E0836A;
    --soil: #C2A67E;
    --sky: #86AEC2;
    --prune: #C9A8DE;
    --frost: #8FB4CC;
    --line: #3A4034;
    --line-strong: #4E5640;
  }
  [data-theme="dark"] body{ background-image: radial-gradient(circle at 1px 1px, rgba(234,230,216,0.05) 1px, transparent 0); }
  [data-theme="dark"] .bed-warning.bad, [data-theme="dark"] .spray-advisory.warn{ background:#3E241D; }
  [data-theme="dark"] .bed-warning.ok, [data-theme="dark"] .spray-advisory.good{ background:#22301B; }
  [data-theme="dark"] .moon-visual{ background:#111; border-color:var(--line-strong); }
  [data-theme="dark"] .moon-visual .lit{ background:#4a4a3a; }

  @media print{
    body{ background:#fff; }
    .sidebar, .tabs, .theme-toggle, .month-picker, .ics-btn, .weather-search, .sidebar-toggle, .candidate-list, .notes-box textarea, .notes-status, .global-search, .sync-note, #authBtn{ display:none !important; }
    .notes-print-text{ display:block !important; }
    .app{ grid-template-columns: 1fr; }
    .header{ border-bottom:2px solid #000; }
    .main{ padding:0; }
    .task-group, .section-card, .problem-card{ break-inside: avoid; }
    a[href]::after{ content:''; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app" id="appRoot">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
          <path d="M20 36C20 36 8 29 8 17C8 10 13 5 20 5C27 5 32 10 32 17C32 29 20 36 20 36Z" stroke="#3B5D33" stroke-width="2"/>
          <path d="M20 34V12" stroke="#3B5D33" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 18C20 18 14 16 14 11" stroke="#6B8F5E" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 24C20 24 26 22 26 17" stroke="#6B8F5E" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>
          <h1>Щоденник дачника</h1>
          <p>Що садити, чим підживити, від чого обприскати</p>
        </div>
      </div>

};
let fbAuth = null, fbDb = null, currentUser = null;
try{
  firebase.initializeApp(firebaseConfig);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
} catch(e){ console.error('Firebase init failed — sign-in/sync unavailable', e); }

function updateAuthUI(user){
  const btn = document.getElementById('authBtn');
  const info = document.getElementById('authInfo');
  const note = document.getElementById('syncNote');
  if(!btn) return;
  if(user){
    btn.textContent = '🚪 Вийти';
    btn.onclick = signOutUser;
    if(info) info.textContent = user.displayName || user.email || '';
    if(note){ note.textContent = '☁️ Синхронізовано як ' + (user.displayName || user.email || 'користувач') + ' — нотатки й грядки доступні з будь-якого пристрою після входу'; note.classList.add('synced'); }
  } else {
    btn.textContent = '🔑 Увійти через Google';
    btn.onclick = signInWithGoogle;
    if(info) info.textContent = '';
    if(note){ note.textContent = '🔒 Нотатки й грядки зберігаються лише в цьому браузері. Увійдіть через Google, щоб синхронізувати їх з іншими пристроями.'; note.classList.remove('synced'); }
  }
}

async function signInWithGoogle(){
  if(!fbAuth){ alert('Вхід тимчасово недоступний.'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  try{ await fbAuth.signInWithPopup(provider); }
  catch(e){ console.error('sign-in failed', e); alert('Не вдалося увійти: ' + e.message); }
}
async function signOutUser(){
  if(!fbAuth) return;
  try{ await fbAuth.signOut(); } catch(e){ console.error(e); }
}

async function pullCloudData(uid){
  try{
    const doc = await fbDb.collection('users').doc(uid).get();
    if(doc.exists){
      const data = doc.data();
      if(data.notes){
        Object.keys(data.notes).forEach(k=> localStorage.setItem('note:'+k, data.notes[k]));
      }
      if(data.beds){
        localStorage.setItem('beds', JSON.stringify(data.beds));
      }
    } else {
      await pushAllLocalData(uid);
    }
  } catch(e){ console.error('cloud pull failed', e); }
}

async function pushAllLocalData(uid){
  try{
    const notes = {};
    for(let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('note:')) notes[key.slice(5)] = localStorage.getItem(key);
    }
    let bedsData = [];
    try{ bedsData = JSON.parse(localStorage.getItem('beds') || '[]'); } catch(e){}
    await fbDb.collection('users').doc(uid).set({ notes, beds: bedsData }, {merge:true});
  } catch(e){ console.error('cloud push failed', e); }
}

if(fbAuth){
  fbAuth.onAuthStateChanged(async (user)=>{
    currentUser = user;
    updateAuthUI(user);
    if(user){
      await pullCloudData(user.uid);
      if(typeof beds !== 'undefined') loadBeds();
      setView(currentView);
    }
  });
}

function handleGlobalSearch(query){
  const box = document.getElementById('globalSearchResults');
  const q = query.trim().toLowerCase();
  if(!q){ box.classList.remove('open'); box.innerHTML = ''; return; }
  const results = [];
  GLOBAL_SEARCH_CATEGORIES.forEach(cat=>{
    cat.items.forEach(item=>{
      if(item.name.toLowerCase().includes(q)) results.push({item, cat});
    });
  });
  if(results.length===0){
    box.innerHTML = `<div class="gsr-empty">Нічого не знайдено</div>`;
  } else {
    box.innerHTML = results.slice(0,20).map((r,i)=>
      `<button class="gsr-item" id="gsr-${i}"><span class="seal">${r.cat.icons[r.item.id]}</span><span>${r.item.name}</span><span class="gsr-cat">${r.cat.label}</span></button>`
    ).join('');
  }
  box.classList.add('open');
  results.slice(0,20).forEach((r,i)=>{
    const btn = document.getElementById(`gsr-${i}`);
    if(btn) btn.onclick = ()=> jumpToItem(r.cat.key, r.cat.view, r.item.id);
  });
}

function jumpToItem(catKey, view, id){
  setView(view);
  if(catKey==='crop') selectCrop(id);
  if(catKey==='tree') selectTree(id);
  if(catKey==='shrub') selectShrub(id);
  if(catKey==='herb') selectHerb(id);
  if(catKey==='flower') selectFlower(id);
  const input = document.getElementById('globalSearch');
  const box = document.getElementById('globalSearchResults');
  if(input) input.value = '';
  if(box){ box.classList.remove('open'); box.innerHTML = ''; }
}

function makeIcs(cropName, taskLabel, month){
  const now = new Date();
  let year = now.getFullYear();
  const nowMonth = now.getMonth() + 1;
  if(month < nowMonth || (month === nowMonth && now.getDate() > 10)) year += 1;
  const dt = new Date(year, month-1, 10, 9, 0);
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const uid = Math.random().toString(36).slice(2) + '@dacha-diary';
  const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Shchodennyk Dachnyka//UK
BEGIN:VEVENT
UID:${uid}
DTSTAMP:${fmt(new Date())}
DTSTART:${fmt(dt)}
SUMMARY:${cropName}: ${taskLabel}
DESCRIPTION:Нагадування зі Щоденника дачника
BEGIN:VALARM
TRIGGER:-P1D
ACTION:DISPLAY
DESCRIPTION:Завтра: ${cropName} — ${taskLabel}
END:VALARM
END:VEVENT
END:VCALENDAR`;
  const blob = new Blob([ics], {type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'nagaduvannya.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadNote(category, id){
  const ta = document.getElementById(`notes-${category}-${id}`);
  const pt = document.getElementById(`notes-print-${category}-${id}`);
  if(!ta) return;
  try{
    const val = localStorage.getItem(`note:${category}:${id}`) || '';
    ta.value = val;
    if(pt) pt.textContent = val || '—';
  } catch(e){ /* localStorage unavailable — leave field empty */ }
}

function saveNote(category, id, value){
  const statusEl = document.getElementById(`notes-status-${category}-${id}`);
  try{
    localStorage.setItem(`note:${category}:${id}`, value);
    const pt = document.getElementById(`notes-print-${category}-${id}`);
    if(pt) pt.textContent = value || '—';
    if(statusEl){ statusEl.textContent = 'Збережено'; setTimeout(()=>{ if(statusEl) statusEl.textContent=''; }, 2000); }
    if(currentUser && fbDb){
      const fieldKey = `${category}:${id}`;
      fbDb.collection('users').doc(currentUser.uid).set({ notes: { [fieldKey]: value } }, {merge:true})
        .then(()=>{ if(statusEl) statusEl.textContent = 'Збережено і синхронізовано ☁️'; })
        .catch(e=>console.error('cloud note save failed', e));
    }
  } catch(e){
    if(statusEl) statusEl.textContent = 'Не вдалося зберегти (сховище браузера недоступне)';
    console.error('note save failed', e);
  }
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let beds = [];
function loadBeds(){
  try{
    const saved = localStorage.getItem('beds');
    beds = saved ? JSON.parse(saved) : [];
  } catch(e){ beds = []; }
  if(beds.length===0){
    beds = [{id:'b1', name:'Грядка 1', assignments:{}}];
  }
}
function saveBeds(){
  try{ localStorage.setItem('beds', JSON.stringify(beds)); } catch(e){ console.error('storage error', e); }
  if(currentUser && fbDb){
    fbDb.collection('users').doc(currentUser.uid).set({ beds }, {merge:true}).catch(e=>console.error('cloud beds save failed', e));
  }
}
function familyOf(cropId){
  const c = crops.find(x=>x.id===cropId);
  return c ? c.family : null;
}
async function renderRotation(){
  const main = document.getElementById('main');
  main.innerHTML = `<div class="dash-title">Сівозміна по грядках</div>
  <p class="dash-sub">Позначте, що росло на кожній грядці попередні роки — і побачите, чи безпечно садити туди обрану культуру зараз. Дані зберігаються особисто для вас.</p>
  <div id="bedsContainer">Завантаження…</div>
  <button class="add-bed-btn" onclick="addBed()">+ Додати грядку</button>
  <div class="rotation-rules">
    <div class="dash-title" style="font-size:19px;">Родини культур і базові правила</div>
    <table><thead><tr><th>Культура</th><th>Родина</th><th>Не садити після</th></tr></thead><tbody>
    ${crops.map(c=>`<tr><td>${c.name}</td><td>${c.family}</td><td>${c.rotationBad}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
  await loadBeds();
  drawBeds();
}
function drawBeds(){
  const cont = document.getElementById('bedsContainer');
  if(!cont) return;
  const year = new Date().getFullYear();
  const years = [year-2, year-1, year];
  let html = '';
  beds.forEach(bed=>{
    html += `<div class="bed-card">
      <div class="bed-head">
        <input value="${escapeHtml(bed.name)}" onchange="renameBed('${bed.id}', this.value)">
        <button class="remove-bed" onclick="removeBed('${bed.id}')">видалити грядку</button>
      </div>
      <div class="bed-years">`;
    years.forEach(y=>{
      html += `<div><label>${y}${y===year ? ' (цей рік)':''}</label>
        <select onchange="setBedYear('${bed.id}', ${y}, this.value)">
          <option value="">— не садив(ла) —</option>
          ${crops.map(c=>`<option value="${c.id}" ${bed.assignments[y]===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select></div>`;
    });
    html += `</div>`;
    const currentCrop = bed.assignments[year];
    if(currentCrop){
      const currentFamily = familyOf(currentCrop);
      const conflictYear = years.filter(y=>y!==year).find(y=> bed.assignments[y] && familyOf(bed.assignments[y])===currentFamily);
      if(conflictYear){
        html += `<div class="bed-warning bad">На цій грядці у ${conflictYear} році вже росла культура тієї ж родини (${currentFamily}). Краще обрати іншу грядку або іншу культуру цього року.</div>`;
      } else {
        html += `<div class="bed-warning ok">Родина культур не повторюється за останні роки — можна садити.</div>`;
      }
    }
    html += `</div>`;
  });
  cont.innerHTML = html;
}
function addBed(){
  beds.push({id:'b'+Date.now(), name:'Грядка '+(beds.length+1), assignments:{}});
  saveBeds(); drawBeds();
}
function removeBed(id){
  beds = beds.filter(b=>b.id!==id);
  saveBeds(); drawBeds();
}
function renameBed(id, name){
  const b = beds.find(x=>x.id===id); if(b) b.name = name;
  saveBeds();
}
function setBedYear(id, year, cropId){
  const b = beds.find(x=>x.id===id); if(!b) return;
  if(cropId) b.assignments[year] = cropId; else delete b.assignments[year];
  saveBeds(); drawBeds();
}

  <div id="weatherResult">${prefillCity ? '' : '<div class="candidate-hint">Однакових назв населених пунктів може бути кілька — введіть назву і оберіть потрібний зі списку (видно область і країну), або натисніть «Визначити моє місцезнаходження», щоб уникнути плутанини взагалі.</div>'}</div>`;
  if(prefillCity) searchCity(prefillCity);
}

async function searchCity(city){
  if(!city) return;
  const result = document.getElementById('weatherResult');
  result.innerHTML = 'Шукаю населені пункти…';
  try{
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=8&language=uk&format=json`);
    const geo = await geoRes.json();
    if(!geo.results || geo.results.length===0){
      result.innerHTML = 'Нічого не знайдено. Спробуйте іншу назву або додайте область (напр. «Іванівка, Вінницька область»).';
      return;
    }
    if(geo.results.length === 1){
      loadWeatherAt(geo.results[0].latitude, geo.results[0].longitude, describePlace(geo.results[0]));
      return;
    }
    let html = `<div class="candidate-hint">Знайдено кілька збігів — оберіть свій населений пункт:</div><div class="candidate-list">`;
    geo.results.forEach((r,i)=>{
      html += `<button class="candidate-item" id="cand-${i}">
        <b>${r.name}</b><span>${[r.admin2, r.admin1, r.country].filter(Boolean).join(', ')} · ${r.latitude.toFixed(2)}, ${r.longitude.toFixed(2)}</span>
      </button>`;
    });
    html += `</div>`;
    result.innerHTML = html;
    geo.results.forEach((r,i)=>{
      const btn = document.getElementById(`cand-${i}`);
      if(btn) btn.onclick = ()=> loadWeatherAt(r.latitude, r.longitude, describePlace(r));
    });
  } catch(e){
    result.innerHTML = 'Не вдалося виконати пошук. Перевірте з’єднання і спробуйте ще раз.';
  }
}

function describePlace(r){
  return [r.name, r.admin1, r.country].filter(Boolean).join(', ');
}

function useMyLocation(){
  const result = document.getElementById('weatherResult');
  if(!navigator.geolocation){
    result.innerHTML = 'Ваш браузер не підтримує визначення місцезнаходження. Скористайтесь пошуком за назвою.';
    return;
  }
  result.innerHTML = 'Визначаю ваше місцезнаходження…';
  navigator.geolocation.getCurrentPosition(
    pos => loadWeatherAt(pos.coords.latitude, pos.coords.longitude, 'ваше поточне місцезнаходження'),
    err => { result.innerHTML = 'Не вдалося отримати місцезнаходження (можливо, доступ заборонено в браузері). Скористайтесь пошуком за назвою.'; }
  );
}

async function loadWeatherAt(latitude, longitude, label){
  const result = document.getElementById('weatherResult');
  result.innerHTML = 'Завантаження прогнозу…';
  try{
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,precipitation,relative_humidity_2m&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`);
    const w = await wRes.json();
    const cur = w.current;
    const daily = w.daily;

    let daysHtml = '';
    for(let i=0;i<daily.time.length;i++){
      const d = new Date(daily.time[i]);
      const dayLabel = i===0 ? 'Сьогодні' : d.toLocaleDateString('uk-UA', {weekday:'short'});
      daysHtml += `<div class="wday"><div class="wd-label">${dayLabel}</div><div class="wd-temp">${Math.round(daily.temperature_2m_min[i])}° / ${Math.round(daily.temperature_2m_max[i])}°</div><div class="wd-rain">опади: ${daily.precipitation_sum[i]} мм</div></div>`;
    }

    const tomorrowRain = daily.precipitation_sum[1] || 0;
    const dayAfterRain = daily.precipitation_sum[2] || 0;
    let advisory;
    if(tomorrowRain > 1 || dayAfterRain > 1){
      advisory = `<div class="spray-advisory warn">Найближчими днями очікуються опади — обприскування краще відкласти, дощ змиє препарат.</div>`;
    } else {
      advisory = `<div class="spray-advisory good">Опадів найближчим часом не очікується — гарний момент для обприскування.</div>`;
    }

    result.innerHTML = `
      <div class="weather-card">
        <div class="weather-now">
          <div class="temp">${Math.round(cur.temperature_2m)}°C</div>
          <div class="desc">${label} · вологість повітря ${cur.relative_humidity_2m}% · опади зараз: ${cur.precipitation} мм</div>
        </div>
        <div class="weather-days">${daysHtml}</div>
        ${advisory}
      </div>
    `;
  } catch(e){
    result.innerHTML = 'Не вдалося завантажити прогноз погоди. Перевірте з’єднання і спробуйте ще раз.';
  }
}

function getMoonInfo(date){
  const lp = 2551443;
  const newMoonRef = new Date(Date.UTC(1970,0,7,20,35,0)).getTime()/1000;
  const phaseSec = ((date.getTime()/1000) - newMoonRef) % lp;
  const normalized = phaseSec < 0 ? phaseSec + lp : phaseSec;
  const day = normalized / 86400;
  let name, growing;
  if(day < 1.5){ name='Новий місяць'; growing=true; }
  else if(day < 7.4){ name='Молодий місяць (росте)'; growing=true; }
  else if(day < 8.4){ name='Перша чверть'; growing=true; }
  else if(day < 13.8){ name='Місяць прибуває'; growing=true; }
  else if(day < 15.8){ name='Повний місяць'; growing=false; }
  else if(day < 21.1){ name='Місяць спадає'; growing=false; }
  else if(day < 23.1){ name='Остання чверть'; growing=false; }
  else { name='Старий місяць (спадає)'; growing=false; }
  return {day, name, growing};
}
function renderMoon(){

    </div>
  </div>
  <table class="moon-table"><thead><tr><th>Фаза</th><th>Традиційно підходить для</th></tr></thead><tbody>
    <tr><td>Зростаючий місяць (від нового до повного)</td><td>Посів і висадка культур, що ростуть вгору: томати, огірки, перець, капуста, зелень</td></tr>

    {term:'Епін, Циркон', text:'Антистресові стимулятори — застосовують після пересадки, під час посухи, після приморозку чи обробки пестицидами, щоб рослина швидше відновилась. Не заміняють добрива й засоби захисту, а допомагають пережити стрес.'},
    {term:'Протруйники насіння', text:'Обробка насіння перед посівом (часто просто розчином марганцівки чи спеціальним фунгіцидом) — захищає паросток від грибків і гнилі в перші дні в грунті, поки він ще слабкий.'}
  ]},
  {group:'Пастки та небіологічний захист', items:[
    {term:'Феромонні пастки', text:'Приманюють самців метеликів (наприклад, плодожерки) запахом самиці — використовують і для відлову, і для сигналізації, коли починається літ шкідника й пора обробляти дерева.'},
    {term:'Клейові пастки (жовті)', text:'Липкі жовті пластини приваблюють і затримують попелицю, білокрилку, трипсів — зручний спосіб побачити, наскільки серйозна проблема, ще до появи явних симптомів на рослині.'}
  ]},
  {group:'Сумісність препаратів', items:[
    {term:'Кислі й лужні засоби окремо', text:'Бордоську рідину (мідний купорос + вапно) не змішують з іншими препаратами в одному оприскуванні — вона сама вже готова суміш, і додавання чогось ще часто руйнує її дію або утворює осад.'},
    {term:'Перевіряйте сумісність на етикетці', text:'Більшість сучасних препаратів мають на упаковці позначку, з чим їх можна чи не можна змішувати. Якщо сумніваєтесь — обробляйте окремо, з інтервалом у кілька днів, а не одночасно.'},
    {term:'Пробна суміш', text:'Перед тим як змішати два препарати вперше, змішайте невелику кількість в окремій ємності — якщо утворюється осад, піна чи різке нагрівання, суміш зіпсована й для рослин непридатна.'}
  ]},
  {group:'Безпечне застосування', items:[
    {term:'Термін очікування', text:'Час між останньою обробкою і збором врожаю, вказаний на упаковці препарату (від кількох днів у біопрепаратів до 3–4 тижнів у деяких хімічних засобів). Недотримання означає ризик залишків хімії в їжі.'},
    {term:'Не обприскувати під час цвітіння', text:'Більшість інсектицидів токсичні для бджіл і джмелів-запилювачів. Обробки проти шкідників плануйте до цвітіння або одразу після — коли квітки вже обсипались.'},
    {term:'Погода для обприскування', text:'Сухий, безвітряний день, зранку або ввечері (не в спеку й не на яскравому сонці — ризик опіків листя). Якщо найближчим часом очікується дощ — обробку краще відкласти (звірте з вкладкою «Погода»).'},
    {term:'Захист і зберігання', text:'Працюйте в рукавичках, уникайте потрапляння на шкіру й слизові, не обприскуйте проти вітру. Готовий розчин використовуйте одразу, не зберігайте про запас. Тримайте препарати подалі від дітей і тварин, в оригінальній упаковці.'}
  ]}
];

function renderProducts(){
  const main = document.getElementById('main');
  let html = `<div class="dash-title">Препарати для захисту рослин</div>
  <p class="dash-sub">Що означають назви засобів, які трапляються в розкладах обприскування по всьому сайту</p>`;
  PRODUCTS_GLOSSARY.forEach(section=>{
    html += `<h3 class="products-group-title">${section.group}</h3>`;
    section.items.forEach(g=>{
      html += `<div class="problem-card"><h4>${g.term}</h4><p>${g.text}</p></div>`;
    });
  });
  main.innerHTML = html;
}

const PROBLEM_CATEGORIES = [
  {id:'all', label:'Усі'},
  {id:'vegetable', label:'Городина'},
  {id:'woody', label:'Дерева і кущі'},
  {id:'universal', label:'Загальні'}
];
let problemsCategory = 'all';

function renderProblems(){
  const main = document.getElementById('main');
  const chips = PROBLEM_CATEGORIES.map(c=>
    `<button class="cat-chip${c.id===problemsCategory?' active':''}" id="cat-${c.id}">${c.label}</button>`
  ).join('');
  main.innerHTML = `<div class="dash-title">Розпізнавання проблем</div>
  <p class="dash-sub">Опишіть, що бачите на рослині — і знайдіть імовірну причину та що робити</p>
  <div class="cat-chips">${chips}</div>
  <div class="problem-search"><input id="probSearch" placeholder="напр. жовті листя, наліт, дірки…" oninput="updateProblemsList(this.value)"></div>
  <div id="probList"></div>`;
  PROBLEM_CATEGORIES.forEach(c=>{
    const btn = document.getElementById('cat-'+c.id);
    if(btn) btn.onclick = ()=> setProblemsCategory(c.id);
  });
  updateProblemsList('');
}
function setProblemsCategory(catId){
  problemsCategory = catId;
  PROBLEM_CATEGORIES.forEach(c=>{
    const btn = document.getElementById('cat-'+c.id);
    if(btn) btn.className = 'cat-chip' + (c.id===catId ? ' active' : '');
  });
  const search = document.getElementById('probSearch');
  updateProblemsList(search ? search.value : '');
}
function updateProblemsList(filter){
  const q = filter.toLowerCase();
  const list = problems.filter(p=>{
    const matchesCategory = problemsCategory==='all' || p.category===problemsCategory;
    const matchesQuery = !q || (p.symptom+p.cause+p.action).toLowerCase().includes(q);
    return matchesCategory && matchesQuery;
  });
  document.getElementById('probList').innerHTML = list.map(p=>`<div class="problem-card">
      <h4>${p.symptom}</h4>
      <p><span class="lbl">Ймовірна причина:</span> ${p.cause}</p>
      <p><span class="lbl">Що робити:</span> ${p.action}</p>
    </div>`).join('') || '<div class="empty-note">Нічого не знайдено — спробуйте інше формулювання або категорію</div>';
}

buildTabs();
buildCropList();
buildTreeList();
buildShrubList();
buildHerbList();
buildFlowerList();
setActiveButtons();
setView('overview');
initSidebarToggle();
initTheme();
</script>
